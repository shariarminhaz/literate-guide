name: Setup Windows VM

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: windows-latest
    
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale-setup.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          msiexec.exe /i $installerPath /quiet /norestart
          Start-Sleep -Seconds 30
          
      - name: Connect to Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=github-actions-vm
          
      - name: Set RDP Password
        run: |
          net user runneradmin "YourPassword123!"
          
      - name: Keep alive
        run: |
          Write-Host "VM is running. Connect via Tailscale RDP to: github-actions-vm"
          Write-Host "Username: runneradmin"
          Write-Host "Password: YourPassword123!"
          Start-Sleep -Seconds 21600
